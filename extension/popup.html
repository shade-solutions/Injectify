<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Injectify</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <img src="icons/icon48.png" alt="" width="20" height="20" />
      <span class="logo-name">Injectify</span>
    </div>
    <button id="open-options" class="icon-btn" title="Open Options (full dashboard)">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                 l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1
                 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65
                 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0
                 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21
                 a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Current URL -->
  <div class="url-bar">
    <span class="url-label">Current page</span>
    <span id="current-url" class="url-text" title="">—</span>
  </div>

  <!-- Active rules -->
  <section class="rules-section">
    <div class="section-header">
      <span>Active rules</span>
      <span id="active-count" class="badge">0</span>
    </div>
    <ul id="rules-list" class="rules-list" aria-live="polite">
      <li class="empty-state">No rules match this page</li>
    </ul>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <button id="manage-btn" class="btn btn-primary">
      Manage all rules
    </button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
